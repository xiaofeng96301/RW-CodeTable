<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Excel风格表格 - 版本过滤下拉菜单</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app-container">
    <!-- 顶部导航条：左侧分类按钮，右侧版本过滤下拉 -->
    <nav class="sticky-nav" id="stickyNav">
        <div class="nav-row">
            <div class="nav-buttons" id="navInner">
                <!-- 分类导航按钮动态生成 -->
            </div>
            <div class="version-dropdown">
                <button class="version-dropdown-btn" id="versionDropdownBtn">
                    🔖 版本过滤 ▼
                </button>
                <div class="version-dropdown-menu" id="versionDropdownMenu">
                    <div class="version-check-list" id="versionCheckList">
                        <!-- 动态生成版本复选框 -->
                    </div>
                    <div class="version-dropdown-actions">
                        <button class="version-action-btn" id="selectAllBtn">✅ 全选</button>
                        <button class="version-action-btn" id="deselectAllBtn">❌ 取消全选</button>
                    </div>
                </div>
            </div>
        </div>
    </nav>
    <div id="accordionContainer" class="accordion"></div>
</div>

<script>
    // 待加载的 JSON 文件列表
    const jsonFiles = ['core.json', 'move.json'];
    const categories = {};

    // 版本管理：存储所有出现的版本（不含通用）
    let allVersions = [];
    // 当前选中的版本集合（版本字符串，不包含'common'，通用单独控制）
    let selectedVersions = new Set();     // 初始全选
    let includeCommon = true;             // 是否包含通用条目（未填写 version 的条目）

    // 加载数据
    async function loadAllData() {
        const promises = jsonFiles.map(async (file) => {
            try {
                const response = await fetch(`json/${file}`);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();
                if (!Array.isArray(data)) throw new Error('数据格式不是数组');
                categories[file] = { rawData: data, error: null };
            } catch (err) {
                console.error(`加载 ${file} 失败:`, err);
                categories[file] = { rawData: null, error: err.message };
            }
        });
        await Promise.all(promises);
        
        // 收集所有版本
        collectVersions();
        // 初始化选中状态：默认全选所有版本 + 包含通用
        includeCommon = true;
        selectedVersions.clear();
        for (const v of allVersions) {
            selectedVersions.add(v);
        }
        
        renderAccordion();       // 构建抽屉面板（默认展开）
        renderNav();             // 构建分类导航按钮
        buildVersionDropdown();  // 构建下拉菜单中的版本复选框
        applyVersionFilter();    // 应用过滤
        attachDropdownEvents();  // 绑定下拉菜单打开/关闭
    }

    // 扫描所有原始数据，收集 version 值（排除空、null、undefined）
    function collectVersions() {
        const versionSet = new Set();
        for (const fileName of jsonFiles) {
            const cat = categories[fileName];
            if (!cat || !cat.rawData) continue;
            for (const item of cat.rawData) {
                const v = item.version;
                if (v && typeof v === 'string' && v.trim() !== '') {
                    versionSet.add(v.trim());
                }
            }
        }
        allVersions = Array.from(versionSet).sort();
    }

    // 根据选中的版本和 includeCommon 过滤数据
    function filterDataByVersion(rawData) {
        if (!Array.isArray(rawData)) return [];
        return rawData.filter(item => {
            const itemVersion = item.version;
            const isCommon = (itemVersion === undefined || itemVersion === null || itemVersion === '');
            if (isCommon) {
                return includeCommon;
            } else {
                return selectedVersions.has(itemVersion);
            }
        });
    }

    // 渲染所有抽屉面板，默认全部展开
    function renderAccordion() {
        const container = document.getElementById('accordionContainer');
        if (!container) return;
        container.innerHTML = '';

        for (const [fileName, { rawData, error }] of Object.entries(categories)) {
            const panelId = fileName.replace('.json', '');
            const panel = document.createElement('div');
            panel.className = 'accordion-item';
            panel.id = `panel-${panelId}`;

            // 标题栏
            const header = document.createElement('div');
            header.className = 'accordion-header';
            const titleSpan = document.createElement('span');
            titleSpan.textContent = `📄 ${fileName}`;
            header.appendChild(titleSpan);
            const countSpan = document.createElement('span');
            countSpan.className = 'record-count-badge';
            header.appendChild(countSpan);
            const icon = document.createElement('span');
            icon.className = 'accordion-icon';
            icon.textContent = '▲';   // 默认展开图标向上
            header.appendChild(icon);

            // 内容区（表格容器），默认显示
            const content = document.createElement('div');
            content.className = 'accordion-content';
            content.style.display = 'block';

            let tableWrapper, table;
            if (error) {
                const errorDiv = document.createElement('div');
                errorDiv.className = 'error-message';
                errorDiv.textContent = `❌ 加载失败: ${error}`;
                content.appendChild(errorDiv);
                tableWrapper = null;
                table = null; 
            } else {
                tableWrapper = document.createElement('div');
                tableWrapper.className = 'table-wrapper';
                table = document.createElement('table');
                table.className = 'excel-table';
                const thead = document.createElement('thead');
                thead.innerHTML = `
                    <tr>
                        <th>📌 代码 (Code)</th>
                        <th>📖 介绍 (Intro)</th>
                        <th>💡 实例 (Example)</th>
                        <th>🏷️ 版本 (Version)</th>
                    </tr>
                `;
                table.appendChild(thead);
                const tbody = document.createElement('tbody');
                table.appendChild(tbody);
                tableWrapper.appendChild(table);
                content.appendChild(tableWrapper);
            }

            panel.appendChild(header);
            panel.appendChild(content);
            container.appendChild(panel);

            // 存储引用
            categories[fileName].panel = panel;
            categories[fileName].content = content;
            categories[fileName].icon = icon;
            categories[fileName].isOpen = true;    // 默认展开
            categories[fileName].table = table;
            categories[fileName].countSpan = countSpan;

            // 绑定标题点击事件（展开/折叠）
            header.addEventListener('click', (e) => {
                e.stopPropagation();
                togglePanel(fileName);
            });
        }
    }

    // 切换面板展开/折叠
    function togglePanel(fileName) {
        const cat = categories[fileName];
        if (!cat || !cat.content) return;
        const isOpen = cat.content.style.display === 'block';
        cat.content.style.display = isOpen ? 'none' : 'block';
        cat.icon.textContent = isOpen ? '▼' : '▲';
        cat.isOpen = !isOpen;
    }

    // 展开并滚动到指定面板（不改变展开状态，但若折叠则展开）
    function expandAndScrollTo(fileName) {
        const cat = categories[fileName];
        if (!cat || !cat.panel) return;
        if (cat.content.style.display !== 'block') {
            togglePanel(fileName);
        }
        cat.panel.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    // 更新单个表格内容
    function updateTableBody(fileName, filteredData) {
        const cat = categories[fileName];
        if (!cat || !cat.table) return;
        const table = cat.table;
        const oldTbody = table.querySelector('tbody');
        const newTbody = document.createElement('tbody');
        
        if (!filteredData || filteredData.length === 0) {
            const emptyRow = document.createElement('tr');
            emptyRow.className = 'empty-row';
            const emptyCell = document.createElement('td');
            emptyCell.colSpan = 4;
            emptyCell.textContent = '暂无符合版本条件的数据';
            emptyRow.appendChild(emptyCell);
            newTbody.appendChild(emptyRow);
        } else {
            for (const item of filteredData) {
                const row = document.createElement('tr');
                const codeCell = document.createElement('td');
                codeCell.textContent = item.code ?? '—';
                const introCell = document.createElement('td');
                introCell.textContent = item.intro ?? (item.description ?? '—');
                const exampleCell = document.createElement('td');
                exampleCell.textContent = item.example ?? (item.instance ?? '—');
                const versionCell = document.createElement('td');
                versionCell.textContent = (item.version !== undefined && item.version !== null && item.version !== '') ? item.version : '通用';
                row.appendChild(codeCell);
                row.appendChild(introCell);
                row.appendChild(exampleCell);
                row.appendChild(versionCell);
                newTbody.appendChild(row);
            }
        }
        oldTbody.replaceWith(newTbody);
        
        if (cat.countSpan) {
            cat.countSpan.textContent = ` (${filteredData.length} 条)`;
        }
    }

    // 全局应用过滤
    function applyVersionFilter() {
        for (const fileName of jsonFiles) {
            const cat = categories[fileName];
            if (!cat || !cat.rawData) continue;
            const filtered = filterDataByVersion(cat.rawData);
            updateTableBody(fileName, filtered);
        }
    }

    // 构建版本下拉菜单中的复选框列表
    function buildVersionDropdown() {
        const container = document.getElementById('versionCheckList');
        if (!container) return;
        container.innerHTML = '';
        
        // 添加“通用”选项
        const commonDiv = document.createElement('div');
        commonDiv.className = 'version-check-item';
        const commonCheck = document.createElement('input');
        commonCheck.type = 'checkbox';
        commonCheck.id = 'version-common';
        commonCheck.checked = includeCommon;
        commonCheck.addEventListener('change', (e) => {
            includeCommon = e.target.checked;
            applyVersionFilter();
        });
        const commonLabel = document.createElement('label');
        commonLabel.htmlFor = 'version-common';
        commonLabel.textContent = '📌 通用 (未指定版本)';
        commonDiv.appendChild(commonCheck);
        commonDiv.appendChild(commonLabel);
        container.appendChild(commonDiv);
        
        // 添加每个具体版本
        for (const ver of allVersions) {
            const div = document.createElement('div');
            div.className = 'version-check-item';
            const check = document.createElement('input');
            check.type = 'checkbox';
            check.id = `version-${ver.replace(/\s/g, '_')}`;
            check.value = ver;
            check.checked = selectedVersions.has(ver);
            check.addEventListener('change', (e) => {
                if (e.target.checked) {
                    selectedVersions.add(ver);
                } else {
                    selectedVersions.delete(ver);
                }
                applyVersionFilter();
            });
            const label = document.createElement('label');
            label.htmlFor = check.id;
            label.textContent = ver;
            div.appendChild(check);
            div.appendChild(label);
            container.appendChild(div);
        }
    }
    
    // 全选/取消全选逻辑
    function selectAllVersions() {
        includeCommon = true;
        selectedVersions.clear();
        for (const v of allVersions) {
            selectedVersions.add(v);
        }
        // 同步复选框状态
        const commonCheck = document.getElementById('version-common');
        if (commonCheck) commonCheck.checked = true;
        for (const ver of allVersions) {
            const check = document.getElementById(`version-${ver.replace(/\s/g, '_')}`);
            if (check) check.checked = true;
        }
        applyVersionFilter();
    }
    
    function deselectAllVersions() {
        includeCommon = false;
        selectedVersions.clear();
        const commonCheck = document.getElementById('version-common');
        if (commonCheck) commonCheck.checked = false;
        for (const ver of allVersions) {
            const check = document.getElementById(`version-${ver.replace(/\s/g, '_')}`);
            if (check) check.checked = false;
        }
        applyVersionFilter();
    }
    
    // 绑定下拉菜单的打开/关闭和全选按钮
    function attachDropdownEvents() {
        const dropdownBtn = document.getElementById('versionDropdownBtn');
        const dropdownMenu = document.getElementById('versionDropdownMenu');
        if (!dropdownBtn || !dropdownMenu) return;
        
        dropdownBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            const isOpen = dropdownMenu.style.display === 'block';
            dropdownMenu.style.display = isOpen ? 'none' : 'block';
        });
        
        // 点击页面其他位置关闭下拉菜单
        document.addEventListener('click', (e) => {
            if (!dropdownBtn.contains(e.target) && !dropdownMenu.contains(e.target)) {
                dropdownMenu.style.display = 'none';
            }
        });
        
        const selectAllBtn = document.getElementById('selectAllBtn');
        const deselectAllBtn = document.getElementById('deselectAllBtn');
        if (selectAllBtn) selectAllBtn.addEventListener('click', selectAllVersions);
        if (deselectAllBtn) deselectAllBtn.addEventListener('click', deselectAllVersions);
    }
    
    // 渲染顶部导航分类按钮
    function renderNav() {
        const navInner = document.getElementById('navInner');
        if (!navInner) return;
        navInner.innerHTML = '';
        jsonFiles.forEach(fileName => {
            const btn = document.createElement('button');
            btn.className = 'nav-btn';
            const displayName = fileName.replace('.json', '');
            btn.textContent = displayName;
            btn.addEventListener('click', () => {
                expandAndScrollTo(fileName);
            });
            navInner.appendChild(btn);
        });
    }
    
    // 启动
    loadAllData();
</script>
</body>
</html>
